<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aria.fany</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --primary-glow: #fe1201;
  --bg-dark: #050505;
  --card-bg: rgba(255, 0, 0, 0.03);
  --border-color: rgba(255, 10, 10, 0.2);
}
* { box-sizing: border-box; }
body {
  margin:0;
  font-family: 'JetBrains Mono', monospace;
  background-color: var(--bg-dark);
  color:#e0e0e0;
  overflow-x:hidden;
  line-height:1.6;
}
/* خلفية الشبكة الرقمية */
body::before {
  content:"";
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:
    linear-gradient(rgba(0,255,65,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,65,0.05) 1px, transparent 1px);
  background-size:30px 30px;
  z-index:-1;
}
/* Header & Logo */
nav {
  padding:25px 5%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border-color);
  background: rgba(5,5,5,0.9);
  backdrop-filter: blur(10px);
  position:sticky;
  top:0;
  z-index:100;
}
.logo {
  color: var(--primary-glow);
  font-weight: 800;
  font-size:22px;
  text-transform:uppercase;
  letter-spacing:3px;
  text-shadow:0 0 10px var(--primary-glow);
}
.status-dot {
  height:8px; width:8px;
  background: var(--primary-glow);
  border-radius:50%;
  display:inline-block;
  margin-right:10px;
  box-shadow:0 0 8px var(--primary-glow);
  animation: blink 1.5s infinite;
}
@keyframes blink {50%{opacity:0;}}
header {
  padding:100px 20px;
  text-align:center;
  position:relative;
}
.glitch-title {
  font-size: clamp(35px, 8vw, 70px);
  font-weight:800;
  text-transform:uppercase;
  color:white;
  margin:0;
  position:relative;
}
.terminal-text {
  color: var(--primary-glow);
  font-size:18px;
  margin-top:15px;
  opacity:0.8;
}
.terminal-text::before { content:"> "; }
section { max-width:1100px; margin:50px auto; padding:0 20px; }

/* معرض الصور */
.gallery { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; padding:40px 20px; }
.card {
  background: var(--card-bg);
  border:1px solid var(--border-color);
  padding:8px;
  border-radius:14px;
  box-shadow:0 0 10px var(--primary-glow);
  transition:0.3s;
}
.card:hover { transform:scale(1.04); box-shadow:0 0 20px var(--primary-glow); }
.card img {
  width:100%;
  height:180px;
  object-fit:contain;
  border-radius:10px;
  cursor:pointer;
}

/* شريط التواصل */
.social-bar { display:flex; justify-content:center; gap:30px; margin-top:50px; padding-bottom:50px; }
.social-bar a { color:#e0e0e0; font-size:24px; transition:0.3s;}
.social-bar a:hover { color: var(--primary-glow); text-shadow:0 0 10px var(--primary-glow); transform:translateY(-5px); }
/* Footer */
footer { text-align:center; padding:40px; font-size:10px; color:#555; border-top:1px solid var(--border-color); word-break: break-all; }
/* Scan line */
.scan-line { width:100%; height:2px; background: rgba(255, 10, 10, 0.1); position:fixed; top:0; z-index:999; animation:scan 8s linear infinite; pointer-events:none;}
@keyframes scan { 0%{top:0;} 100%{top:100%;} }

/* Lightbox */
.modal {
  display:none;
  position:fixed;
  inset:0;
  background: rgba(38, 35, 35, 0.95);
  justify-content:center;
  align-items:center;
  z-index:900;
}
.modal img {
  max-width:95%;
  max-height:90%;
  border-radius:12px;
  box-shadow:0 0 30px var(--primary-glow);
}

/* مؤشر الماوس المخصص */
#custom-cursor {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background-color: var(--primary-glow);
  position: absolute;
  pointer-events: none;
  z-index: 999;
}

/* تأثير التلاشي عند التمرير */
[data-scroll] {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}

[data-scroll].visible {
  opacity: 1;
  transform: translateY(0);
}
/* التجاوب للموبايل (Responsiveness) */
@media (max-width: 600px) {
  nav { padding: 15px 5%; flex-direction: column; gap: 10px; text-align: center; }
  header { padding: 60px 10px; }
  .gallery { grid-template-columns: 1fr; }
  .social-bar { gap: 20px; }
}
</style>
</head>
<body>
<div class="scan-line"></div>
<div id="custom-cursor"></div>

<nav>
  <div class="logo"><span class="status-dot"></span>ARIA.FANY</div>
  <div style="font-size:12px; color:var(--primary-glow);">ENCRYPTED_CONNECTION</div>
</nav>

<header>
  <h1 class="glitch-title">HI STUDENT</h1>
  <p class="terminal-text">the image is below</p>
</header>

<section class="gallery" data-scroll>
  <div class="card"><img src="images/jpg.1.png" alt="صورة 1"></div>
</section>

<div class="social-bar">
  <a href="https://www.facebook.com/share/1F5Fz2gRWS/"><i class="fab fa-facebook"></i></a>
  <a href="https://t.me/ariasirwan" target="_blank"><i class="fab fa-telegram"></i></a>
</div>

<footer>
[SYSTEM READY] — 2025 — aria.411322026@uor.edu.krd
</footer>

<div class="modal" id="modal">
  <img id="modalImg">
</div>

<script>
// تأثير التلاشي عند التمرير (Fade-in on scroll)
const scrollElements = document.querySelectorAll("[data-scroll]");

const elementInView = (el, dividend = 1) => {
  const elementTop = el.getBoundingClientRect().top;

  return (
    elementTop <=
    (window.innerHeight || document.documentElement.clientHeight) / dividend
  );
};

const displayScrollElement = (element) => {
  element.classList.add("visible");
};

const hideScrollElement = (element) => {
  element.classList.remove("visible");
};

const handleScrollAnimation = () => {
  scrollElements.forEach((el) => {
    if (elementInView(el, 1.25)) {
      displayScrollElement(el);
    } else {
      hideScrollElement(el);
    }
  });
};

window.addEventListener("scroll", () => {
  handleScrollAnimation();
});



document.addEventListener('mousemove', (e) => {
  cursor.style.left = e.pageX + 'px';
  cursor.style.top = e.pageY + 'px';
});

// Lightbox for gallery
const images = document.querySelectorAll(".gallery img");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
images.forEach(img => {
  img.onclick = () => {
    modal.style.display = "flex";
    modalImg.src = img.src;
  }
});
modal.onclick = () => { modal.style.display = "none"; }
</script>
</body>

</html>
